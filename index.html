<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#003366">
  <title>Centralized SAS Repository</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button id="nav-toggle" class="nav-toggle" type="button" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">
    ☰
  </button>
  <div id="nav-overlay" class="nav-overlay" hidden></div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">SAS</span>
      <span class="repo-title">Centralized Repository</span>
    </div>
    <nav class="nav">
      <a href="#home" class="nav-item active" data-page="home">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">Home</span>
      </a>
      <div id="nav-dynamic">
        <!-- Sections + systems injected from config -->
      </div>
    </nav>
    <div class="sidebar-footer">
      <small>Add systems in <code>systems/config.json</code></small>
    </div>
  </aside>

  <main class="content">
    <div id="page-content" class="page-content">
      <!-- Loading (used when opening a deep-link hash directly) -->
      <section id="loading" class="page">
        <div class="welcome-card">
          <h2>Loading…</h2>
          <p>Preparing your system.</p>
        </div>
      </section>
      <!-- System view (shows only the embedded system HTML) -->
      <section id="system-view" class="page system-view">
        <iframe id="system-frame" class="system-frame" title="System"></iframe>
      </section>
      <!-- Home content -->
      <section id="home" class="page active">
        <div class="home-hero">
          <img
            src="https://nbsc.edu.ph/wp-content/uploads/2024/03/cropped-NBSC_NewLogo_icon.png"
            class="home-hero-logo"
            alt="NBSC Logo"
          >
          <div class="home-hero-title">NBSC SAS</div>
          <div class="home-hero-subtitle">Centralized Systems Hub</div>
          <div class="home-hero-divider"></div>

          <div class="home-hero-meta">
            <div class="home-hero-stat">
              <div class="home-hero-stat-value" id="stat-systems">—</div>
              <div class="home-hero-stat-label">Systems available</div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
